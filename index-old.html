<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Bingo</title>

<style>
body {
  font-family: sans-serif;
  text-align:center;
  background: linear-gradient(135deg,#fdfbfb,#ebedee);
}
#bingo {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  max-width:500px;
  margin:auto;
}
.cell {
  background:white;
  border:2px solid #ddd;
  padding:8px;
  border-radius:10px;
  min-height:80px;
  font-size:12px;
}
.cell.marked { background:#4caf50; color:white; }
.cell.free { background:#2196f3; color:white; }

input {
  margin-top:4px;
  width:90%;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
}

#claimBtn { display:none; }
</style>
</head>

<body>

<h2>🎉 Wedding Bingo</h2>

<div id="bingo"></div>

<button id="claimBtn" onclick="claim()">Claim BINGO</button>

<div id="qr"></div>

<audio id="winSound" src="https://www.soundjay.com/human/cheering-01.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const SALT = "Walima2026";

/* PROMPTS */
const PROMPTS = [
  {text:"Someone checks mirror", needsName:true},
  {text:"Someone laughs uncontrollably", needsName:true},
  {text:"Someone spills drink", needsName:true},
  {text:"Someone dancing confidently", needsName:true},
  {text:"Someone takes a selfie", needsName:true},
  {text:"Someone fixes outfit", needsName:true},
  {text:"Someone whispers gossip", needsName:true},
  {text:"Bride laughs loudly"},
  {text:"Someone cries"},
  {text:"MC makes a joke"},
  {text:"Speech gets emotional"},
  {text:"Crowd cheers"},
  {text:"Camera flashes"},
  {text:"Someone leaves early"},
  {text:"Kid running around"},
  {text:"Someone late to table"},
  {text:"Someone claps off beat"},
  {text:"Someone says wow"},
  {text:"Someone filming vertically"},
  {text:"Someone asks for WiFi"}
];

let seed, rng, state=[], hasWon=false;
let winningLine = null;

/* RNG */
function getSeed(){
  return crypto.getRandomValues(new Uint32Array(1))[0];
}
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;}}

/* HASH */
async function hash(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,8);
}

/* GENERATE */
function generateCard(){
  const shuffled=[...PROMPTS].sort(()=>rng()-0.5).slice(0,24);
  let grid=[], idx=0;
  for(let i=0;i<5;i++){
    grid[i]=[];
    for(let j=0;j<5;j++){
      grid[i][j]=(i===2&&j===2)?"FREE":shuffled[idx++];
    }
  }
  return grid;
}

/* RENDER */
function render(grid){
  const c=document.getElementById("bingo");
  c.innerHTML="";
  state=[]; hasWon=false; winningLine=null;
  document.getElementById("claimBtn").style.display="none";

  grid.forEach((row,i)=>{
    state[i]=[];
    row.forEach((item,j)=>{
      let d=document.createElement("div");
      d.className="cell";

      if(item==="FREE"){
        d.innerText="FREE";
        d.classList.add("free","marked");
        state[i][j]=true;
      } else {
        d.innerHTML = `
          <div>${item.text}</div>
          ${item.needsName ? '<input placeholder="Who?">' : ''}
        `;
        state[i][j]=false;
      }

      d.onclick=()=>{
        if(hasWon || item==="FREE") return;
        state[i][j]=!state[i][j];
        d.classList.toggle("marked");
        checkWin();
      };

      c.appendChild(d);
    });
  });
}

/* CHECK WIN */
function checkWin(){
  const lines=[
    ...[0,1,2,3,4].map(i=>[0,1,2,3,4].map(j=>[i,j])),
    ...[0,1,2,3,4].map(j=>[0,1,2,3,4].map(i=>[i,j])),
    [[0,0],[1,1],[2,2],[3,3],[4,4]],
    [[0,4],[1,3],[2,2],[3,1],[4,0]]
  ];

  for(let line of lines){
    if(line.every(([i,j])=>state[i][j])){
      hasWon=true;
      winningLine=line;

      document.getElementById("claimBtn").style.display="block";
      document.getElementById("winSound").play();
      confetti();

      // highlight line
      line.forEach(([i,j])=>{
        document.getElementById("bingo").children[i*5+j].style.border="3px solid gold";
      });

      return;
    }
  }
}

/* CLAIM */
async function claim(){
  const code = await hash(seed + SALT);

  const details = winningLine.map(([i,j])=>{
    const cell = document.getElementById("bingo").children[i*5+j];
    const text = cell.innerText;
    const input = cell.querySelector("input");
    return {
      text,
      name: input ? input.value : null
    };
  });

  const payload = JSON.stringify({
    seed,
    code,
    line: details
  });

  QRCode.toCanvas(payload, {width:220}, function (err, canvas) {
    const qrDiv=document.getElementById("qr");
    qrDiv.innerHTML="";
    qrDiv.appendChild(canvas);
  });
}

/* CONFETTI */
function confetti(){
  for(let i=0;i<100;i++){
    let div=document.createElement("div");
    div.style.position="fixed";
    div.style.width="6px";
    div.style.height="6px";
    div.style.background="hsl(" + Math.random()*360 + ",100%,50%)";
    div.style.top="0px";
    div.style.left=Math.random()*window.innerWidth+"px";
    div.style.transition="transform 2s linear";
    document.body.appendChild(div);

    setTimeout(()=>{ div.style.transform="translateY(100vh)"; },10);
    setTimeout(()=>div.remove(),2000);
  }
}

/* INIT */
function newCard(){
  seed=getSeed();
  rng=mulberry32(seed);
  render(generateCard());
}
newCard();
</script>

</body>
</html>
