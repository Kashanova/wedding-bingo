<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Bingo</title>

<style>
body { font-family:sans-serif; text-align:center; background:#fafafa;}
#bingo { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; max-width:500px; margin:auto;}
.cell { background:white; border:2px solid #ddd; padding:10px; border-radius:10px; min-height:70px; display:flex; align-items:center; justify-content:center; font-size:12px;}
.cell.marked { background:#4caf50; color:white;}
.cell.free { background:#2196f3; color:white;}
button { margin-top:10px; padding:10px; border:none; border-radius:8px; background:black; color:white;}
#claimBtn { display:none; }
#qr { margin-top:15px; }
</style>
</head>

<body>

<h2>🎉 Wedding Bingo</h2>
<div id="bingo"></div>

<button id="claimBtn" onclick="claim()">Claim BINGO</button>

<div id="qr"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const PROMPTS = [/* keep your prompts */];

let seed, rng, state=[], hasWon=false;

function getSeed(){
  return crypto.getRandomValues(new Uint32Array(1))[0];
}
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;}}

async function hash(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,8);
}

function generateCard(){
  const shuffled=[...PROMPTS].sort(()=>rng()-0.5).slice(0,24);
  let grid=[], idx=0;
  for(let i=0;i<5;i++){
    grid[i]=[];
    for(let j=0;j<5;j++){
      grid[i][j]=(i===2&&j===2)?"FREE":shuffled[idx++];
    }
  }
  return grid;
}

function render(grid){
  const c=document.getElementById("bingo");
  c.innerHTML=""; state=[]; hasWon=false;

  grid.forEach((row,i)=>{
    state[i]=[];
    row.forEach((text,j)=>{
      let d=document.createElement("div");
      d.className="cell"; d.innerText=text;

      if(text==="FREE"){d.classList.add("free","marked"); state[i][j]=true;}
      else state[i][j]=false;

      d.onclick=()=>{
        if(hasWon||text==="FREE")return;
        state[i][j]=!state[i][j];
        d.classList.toggle("marked");
        checkWin();
      };

      c.appendChild(d);
    });
  });
}

function checkWin(){
  const lines=[
    ...[0,1,2,3,4].map(i=>[0,1,2,3,4].map(j=>[i,j])),
    ...[0,1,2,3,4].map(j=>[0,1,2,3,4].map(i=>[i,j])),
    [[0,0],[1,1],[2,2],[3,3],[4,4]],
    [[0,4],[1,3],[2,2],[3,1],[4,0]]
  ];

  for(let line of lines){
    if(line.every(([i,j])=>state[i][j])){
      hasWon=true;
      document.getElementById("claimBtn").style.display="block";
      return;
    }
  }
}

async function claim(){
  const code = await hash(seed.toString());
  const payload = JSON.stringify({seed:seed, code:code});

  const qrDiv=document.getElementById("qr");
  qrDiv.innerHTML="";
  QRCode.toCanvas(payload, {width:200}, function (err, canvas) {
    qrDiv.appendChild(canvas);
  });
}

function newCard(){
  seed=getSeed();
  rng=mulberry32(seed);
  render(generateCard());
}
newCard();
</script>

</body>
</html>
